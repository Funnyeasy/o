el.innerHTML = '';
qrInstance = new QRCode(el, {
text: QR_TARGET_URL,
width: 200,
height: 200,
colorDark: '#000000',
colorLight: '#ffffff',
correctLevel: QRCode.CorrectLevel.H
});
} else {
qrInstance.clear();
qrInstance.makeCode(QR_TARGET_URL);
}
}
var state = {
version:null,
qIndex:0,
answers:[],
quizData:null
};
function $(sel){ return document.querySelector(sel); }
function show(id){
document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
$('#'+id).classList.add('active');
window.scrollTo({top:0,behavior:'instant' in window ? 'instant' : 'auto'});
}
document.querySelectorAll('.entry-btn').forEach(function(btn){
btn.addEventListener('click', function(){
startQuiz(btn.getAttribute('data-version'));
});
});
function startQuiz(version){
state.version = version;
state.qIndex = 0;
state.answers = [];
state.quizData = QUIZ_DATA[version];
document.querySelector('#quizIllus').innerHTML = version === 'zhubo' ? SVG_QUIZ_ZHUBO : SVG_QUIZ_DAGE;
show('view-quiz');
renderQuestion();
}
function renderQuestion(){
var q = state.quizData.questions[state.qIndex];
var total = state.quizData.questions.length;
$('#progressLabel').textContent = '第 ' + (state.qIndex+1) + '/' + total + ' 题';
$('#progressFill').style.width = ((state.qIndex) / total * 100) + '%';
$('#quizQuestion').textContent = q.q;
var optWrap = $('#quizOptions');
optWrap.innerHTML = '';
q.opts.forEach(function(opt){
var b = document.createElement('button');
b.className = 'option-btn';
b.innerHTML = '<span class="option-label">'+opt.label+'</span><span>'+escapeHtml(opt.text)+'</span>';
b.addEventListener('click', function(){
if(b.classList.contains('locked')) return;
optWrap.querySelectorAll('.option-btn').forEach(function(x){ x.classList.add('locked'); });
b.classList.add('selected');
state.answers.push(opt.w);
setTimeout(function(){ advance(); }, 380);
});
optWrap.appendChild(b);
});
}
function advance(){
state.qIndex++;
if(state.qIndex >= state.quizData.questions.length){
$('#progressFill').style.width = '100%';
setTimeout(computeAndShowResult, 250);
} else {
renderQuestion();
}
}
function computeAndShowResult(){
var counts = {1:0,2:0,3:0,4:0};
state.answers.forEach(function(w){ w.forEach(function(n){ counts[n]++; }); });
var max = Math.max(counts[1],counts[2],counts[3],counts[4]);
var tied = [1,2,3,4].filter(function(n){ return counts[n] === max; });
var winner;
if(tied.length === 1){
winner = tied[0];
} else {
var last = state.answers[state.answers.length-1];
winner = null;
for(var i=0;i<last.length;i++){
if(tied.indexOf(last[i]) !== -1){ winner = last[i]; break; }
}
if(winner === null) winner = tied.sort(function(a,b){return a-b;})[0];
}
showResult(state.version, winner);
}
function escapeHtml(s){
return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showResult(version, typeNum){
var r = QUIZ_DATA[version].results[String(typeNum)];
var accentClass = 'accent-' + typeNum;
$('#view-result').className = 'view theme-' + typeNum;
var typeCodeEl = $('#resultTypeCode');
typeCodeEl.textContent = TYPE_CODE[typeNum];
typeCodeEl.className = 'result-typecode ' + accentClass;
document.querySelector('#resultIllus').innerHTML = RESULT_SVG[typeNum];
var kicker = $('#resultKicker');
kicker.textContent = (version === 'zhubo' ? '主播人格' : '大哥人格');
kicker.className = 'result-kicker ' + accentClass;
var nameEl = $('#resultName');
nameEl.textContent = r.name;
nameEl.className = 'result-name ' + accentClass;
var tagEl = $('#resultTagline');
tagEl.textContent = r.tagline;
tagEl.className = 'result-tagline';
$('#resultDrive').textContent = r.drive;
$('#resultBehavior').textContent = r.behavior;
$('#resultPsychology').textContent = r.psychology;
var sumEl = $('#resultSummary');
sumEl.textContent = r.summary;
sumEl.className = 'result-summary ' + accentClass;
$('#resultQuote').textContent = '“' + r.quote + '”';
var list = $('#resultStrengths');
list.innerHTML = '';
r.strengths.forEach(function(s){
var li = document.createElement('li');
li.textContent = s;
list.appendChild(li);
});
state.currentResult = { version:version, typeNum:typeNum, r:r };
show('view-result');
renderResultQR();
}
$('#restartBtn').addEventListener('click', function(){ show('view-home'); });
$('#saveImgBtn').addEventListener('click', function(){
generateShareImage(state.currentResult);
});
function wrapText(ctx, text, x, y, maxWidth, lineHeight, dryRun){
var words = text.split('');
var line = '';
var lines = [];
for(var i=0;i<words.length;i++){
var test = line + words[i];
if(ctx.measureText(test).width > maxWidth && line.length > 0){
lines.push(line);
line = words[i];
} else {
line = test;
}
}
lines.push(line);
if(!dryRun){
lines.forEach(function(l, idx){
ctx.fillText(l, x, y + idx*lineHeight);
});
}
return lines.length * lineHeight;
}
var CANVAS_FONT = "'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif";
var SECTION_COLORS = {
tagline: '#7C1FA0', drive: '#C77D00', behavior: '#D9480F',
psychology: '#C81E3A', quote: '#B8121F'
};
var CHIP_COLORS = [
{bg:'rgba(124,31,160,.10)', text:'#7C1FA0'},
{bg:'rgba(200,30,58,.09)', text:'#C81E3A'},
{bg:'rgba(199,125,0,.11)', text:'#A6690A'},
{bg:'rgba(217,72,15,.10)', text:'#B23D0C'}
];
function svgToImage(svgString){
return new Promise(function(resolve, reject){
var img = new Image();
var blob = new Blob([svgString], {type:'image/svg+xml;charset=utf-8'});
var url = URL.createObjectURL(blob);
img.onload = function(){ URL.revokeObjectURL(url); resolve(img); };
img.onerror = function(e){ URL.revokeObjectURL(url); reject(e); };
img.src = url;
});
}
function drawChip(ctx, text, x, y, maxWidth, colorObj, dryRun){
ctx.font = '500 26px ' + CANVAS_FONT;
var words = text.split('');
var lines = []; var line = '';
var padX = 22, padY = 16, lineH = 36;
for(var i=0;i<words.length;i++){
var test = line + words[i];
if(ctx.measureText(test).width > maxWidth - padX*2 && line.length>0){ lines.push(line); line = words[i]; }
else line = test;
}
lines.push(line);
var boxH = lines.length*lineH + padY*2 - 8;
if(!dryRun){
ctx.fillStyle = colorObj.bg;
roundRect(ctx, x, y, maxWidth, boxH, 14);
ctx.fill();
ctx.fillStyle = colorObj.text;
lines.forEach(function(l, idx){ ctx.fillText(l, x+padX, y+padY+26+idx*lineH); });
}
return boxH + 14;
}
function roundRect(ctx, x, y, w, h, r){
ctx.beginPath();
ctx.moveTo(x+r, y);
ctx.arcTo(x+w, y, x+w, y+h, r);
ctx.arcTo(x+w, y+h, x, y+h, r);
ctx.arcTo(x, y+h, x, y, r);
ctx.arcTo(x, y, x+w, y, r);
ctx.closePath();
}
function wrapTextCenter(ctx, text, cx, y, maxWidth, lineHeight, dryRun){
var prevAlign = ctx.textAlign;
ctx.textAlign = 'center';
var words = text.split('');
var line = ''; var lines = [];
for(var i=0;i<words.length;i++){
var test = line + words[i];
if(ctx.measureText(test).width > maxWidth && line.length>0){ lines.push(line); line = words[i]; }
else line = test;
}
lines.push(line);
if(!dryRun){
lines.forEach(function(l, idx){ ctx.fillText(l, cx, y + idx*lineHeight); });
}
ctx.textAlign = prevAlign;
return lines.length * lineHeight;
}
function hexToRgba(hex, alpha){
var h = hex.replace('#','');
var r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
return 'rgba('+r+','+g+','+b+','+alpha+')';
}
function drawResultQRBadge(ctx, W){
var qrCanvas = document.querySelector('#resultQR canvas');
if(!qrCanvas) return;
var boxSize = 190, pad = 14;
var boxX = W - 90 - boxSize, boxY = 40;
ctx.save();
ctx.shadowColor = 'rgba(20,23,26,.18)';
ctx.shadowBlur = 24;
ctx.shadowOffsetY = 10;
ctx.fillStyle = '#FFFFFF';
roundRect(ctx, boxX, boxY, boxSize, boxSize, 22);
ctx.fill();
ctx.restore();
ctx.drawImage(qrCanvas, boxX + pad, boxY + pad, boxSize - pad*2, boxSize - pad*2);
ctx.textAlign = 'center';
ctx.fillStyle = '#8A8D91';
ctx.font = '600 22px ' + CANVAS_FONT;
ctx.fillText('回到首页', boxX + boxSize/2, boxY + boxSize + 34);
}
function layoutResultImage(ctx, W, mascotImg, version, typeNum, r, color, dryRun){
if(!dryRun){
drawResultQRBadge(ctx, W);
}
ctx.textAlign = 'center';
if(!dryRun){
ctx.fillStyle = '#8A8D91';
ctx.font = '600 26px ' + CANVAS_FONT;
ctx.fillText((version === 'zhubo' ? '主播人格测试' : '大哥人格测试'), W/2, 90);
}
if(!dryRun){
ctx.fillStyle = color;
ctx.font = '900 60px ' + CANVAS_FONT;
ctx.fillText(TYPE_CODE[typeNum], W/2, 165);
}
var mw = 460, mh = mw * (mascotImg.height/mascotImg.width);
if(!dryRun) ctx.drawImage(mascotImg, W/2 - mw/2, 190, mw, mh);
var y = 190 + mh + 50;
ctx.font = '800 62px ' + CANVAS_FONT;
if(!dryRun){ ctx.fillStyle = '#16181A'; ctx.fillText(r.name, W/2, y); }
y += 60;
ctx.font = '600 32px ' + CANVAS_FONT;
if(!dryRun) ctx.fillStyle = SECTION_COLORS.tagline;
y += wrapTextCenter(ctx, r.tagline, W/2, y+30, W-160, 44, dryRun) + 30;
ctx.textAlign = 'left';
var x = 90; var boxW = W - 180;
ctx.font = '700 22px ' + CANVAS_FONT;
if(!dryRun){ ctx.fillStyle = '#8A8D91'; ctx.fillText('性格优势', x, y); }
y += 20;
r.strengths.forEach(function(s, idx){
y += drawChip(ctx, s, x, y, boxW, CHIP_COLORS[idx % 4], dryRun);
});
y += 20;
function section(label, text, labelColor){
ctx.font = '800 22px ' + CANVAS_FONT;
if(!dryRun){ ctx.fillStyle = labelColor; ctx.fillText(label, x, y); }
y += 38;
ctx.font = '400 27px ' + CANVAS_FONT;
if(!dryRun) ctx.fillStyle = '#2B2E33';
y += wrapText(ctx, text, x, y, boxW, 40, dryRun) + 36;
}
section('核心驱动力', r.drive, SECTION_COLORS.drive);
section('典型行为', r.behavior, SECTION_COLORS.behavior);
section('心理底层', r.psychology, SECTION_COLORS.psychology);
ctx.font = '700 36px ' + CANVAS_FONT;
if(!dryRun) ctx.fillStyle = color;
y += wrapText(ctx, r.summary, x, y+10, boxW, 48, dryRun) + 30;
ctx.font = '600 26px ' + CANVAS_FONT;
var quoteText = '“' + r.quote + '”';
var qLines = Math.ceil(ctx.measureText(quoteText).width / (boxW-60)) || 1;
var qh = Math.max(70, qLines*36+40);
if(!dryRun){
ctx.fillStyle = 'rgba(232,115,74,.08)';
roundRect(ctx, x, y, boxW, qh, 12);
ctx.fill();
ctx.fillStyle = '#E6E4DF';
ctx.fillRect(x, y, 5, qh);
ctx.fillStyle = SECTION_COLORS.quote;
wrapText(ctx, quoteText, x+30, y+42, boxW-60, 36, false);
}
y += qh + 60;
if(!dryRun){
ctx.textAlign = 'center';
ctx.fillStyle = '#8A8D91';
ctx.font = '500 24px ' + CANVAS_FONT;
ctx.fillText('测测你是哪一种人格', W/2, y);
}
y += 50;
return y;
}
function generateShareImage(payload){
var version = payload.version, typeNum = payload.typeNum, r = payload.r;
var color = TYPE_COLORS[typeNum];
var W = 1080;
var canvas = $('#shareCanvas');
svgToImage(RESULT_SVG[typeNum]).then(function(mascotImg){
canvas.width = W; canvas.height = 800;
var measureCtx = canvas.getContext('2d');
var totalH = layoutResultImage(measureCtx, W, mascotImg, version, typeNum, r, color, true);
var logicalH = Math.ceil(totalH) + 20;
var SAFE_MAX_DIM = 4000;
var scale = logicalH > SAFE_MAX_DIM ? (SAFE_MAX_DIM / logicalH) : 1;
canvas.width = Math.max(1, Math.round(W * scale));
canvas.height = Math.max(1, Math.round(logicalH * scale));
var ctx = canvas.getContext('2d');
if(scale !== 1){ ctx.scale(scale, scale); }
ctx.fillStyle = '#FAFAF9';
ctx.fillRect(0,0,W,logicalH);
var grad = ctx.createRadialGradient(W/2,0,0,W/2,0,900);
grad.addColorStop(0, hexToRgba(color, 0.14));
grad.addColorStop(1, 'rgba(250,250,249,0)');
ctx.fillStyle = grad;
ctx.fillRect(0,0,W,Math.min(900,logicalH));
layoutResultImage(ctx, W, mascotImg, version, typeNum, r, color, false);
presentOrDownload(canvas);
}).catch(function(){
canvas.width = W; canvas.height = 500;
var ctx = canvas.getContext('2d');
ctx.fillStyle = '#FAFAF9'; ctx.fillRect(0,0,W,canvas.height);
drawResultQRBadge(ctx, W);
ctx.fillStyle = color; ctx.textAlign='center';
ctx.font = '800 56px ' + CANVAS_FONT;
ctx.fillText(r.name, W/2, 200);
ctx.fillStyle = '#2B2E33'; ctx.font = '400 28px ' + CANVAS_FONT;
wrapTextCenter(ctx, r.tagline, W/2, 280, W-160, 40, false);
presentOrDownload(canvas);
});
}
function isMobileDevice(){
var ua = navigator.userAgent || '';
if(/Android|iPhone|iPad|iPod|Mobile|HarmonyOS/i.test(ua)) return true;
if(navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) return true;
return false;
}
function presentOrDownload(canvas){
showSharePreview(canvas);
}
function downloadCanvas(canvas){
canvas.toBlob(function(blob){
if(!blob){
var link = document.createElement('a');
link.download = 'my-result.png';
link.href = canvas.toDataURL('image/png');
link.click();
return;
}
var url = URL.createObjectURL(blob);
var link = document.createElement('a');
link.download = 'my-result.png';
link.href = url;
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
setTimeout(function(){ URL.revokeObjectURL(url); }, 60000);
}, 'image/png');
}
var sharePreviewBlob = null;
var sharePreviewUrl = null;
function showSharePreview(canvas){
canvas.toBlob(function(blob){
if(!blob) return;
if(sharePreviewUrl){ URL.revokeObjectURL(sharePreviewUrl); }
sharePreviewBlob = blob;
sharePreviewUrl = URL.createObjectURL(blob);
var img = document.getElementById('sharePreviewImg');
img.src = sharePreviewUrl;
var hint = document.getElementById('sharePreviewHint');
if(hint){
hint.textContent = isMobileDevice()
? '长按图片，选择"保存图片"存入相册'
: '右键图片，选择"图片另存为"，或点击下方按钮直接保存';
}
document.getElementById('sharePreviewOverlay').classList.add('active');
document.getElementById('sharePreviewScroll').scrollTop = 0;
}, 'image/png');
}
function closeSharePreview(){
document.getElementById('sharePreviewOverlay').classList.remove('active');
}
document.getElementById('sharePreviewClose').addEventListener('click', closeSharePreview);
document.getElementById('sharePreviewOverlay').addEventListener('click', function(e){
if(e.target === document.getElementById('sharePreviewOverlay')) closeSharePreview();
});
document.getElementById('sharePreviewSaveBtn').addEventListener('click', function(){
if(!sharePreviewBlob) return;
if(!isMobileDevice()){
downloadCanvas(document.getElementById('shareCanvas'));
return;
}
var file = new File([sharePreviewBlob], 'my-result.png', {type:'image/png'});
if(navigator.canShare && navigator.canShare({files:[file]})){
navigator.share({files:[file], title:'我的测试结果'}).catch(function(){
fallbackSaveFromPreview();
});
return;
}
fallbackSaveFromPreview();
});
function fallbackSaveFromPreview(){
alert('请长按上方图片，选择"保存图片"即可存入手机相册');
}
document.addEventListener('contextmenu', function(e){
if(e.target.closest && e.target.closest('#sharePreviewOverlay')) return;
e.preventDefault();
});
document.addEventListener('selectstart', function(e){ e.preventDefault(); });
document.addEventListener('copy', function(e){ e.preventDefault(); });
document.addEventListener('dragstart', function(e){
if(e.target.closest && e.target.closest('#sharePreviewOverlay')) return;
e.preventDefault();
});
document.addEventListener('keydown', function(e){
var k = e.key ? e.key.toLowerCase() : '';
if((e.ctrlKey || e.metaKey) && ['c','u','s','p'].indexOf(k) !== -1){ e.preventDefault(); }
if(k === 'f12'){ e.preventDefault(); }
});
})();
</script>
